<!DOCTYPE html>
<html>
<head>
    <title>Product Discount</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        .box {
            width: 300px;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
        }
        button {
            margin-top: 15px;
            padding: 8px;
            width: 100%;
            background-color: green;
            color: white;
            border: none;
        }
        .output {
            margin-top: 15px;
            font-weight: bold;
            color: blue;
        }
    </style>
</head>
<body>

<div class="box">
    <h3>Product Discount Calculator</h3>

    <label>Select Product:</label>
    <select id="product">
        <option value="500">Mouse - ₹500</option>
        <option value="1000">Keyboard - ₹1000</option>
        <option value="50000">Laptop - ₹50000</option>
    </select>

    <label>Enter Discount (%):</label>
    <input type="number" id="discount" placeholder="Enter discount">

    <button onclick="calculate()">Calculate</button>

    <div class="output" id="result"></div>
</div>

<script>
function calculate() {
    let price = document.getElementById("product").value;
    let discount = document.getElementById("discount").value;

    if (discount === "") {
        document.getElementById("result").innerHTML = "Please enter discount";
        return;
    }

    let discountAmount = (price * discount) / 100;
    let finalPrice = price - discountAmount;

    document.getElementById("result").innerHTML =
        "Original Price: ₹" + price + "<br>" +
        "Discount: ₹" + discountAmount + "<br>" +
        "Final Price: ₹" + finalPrice;
}
</script>

</body>
</html>
