<!DOCTYPE html>
<html>
<head>
  <title>UI with Progress Bar</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
    }

    .box {
      width: 180px;
      height: 150px;
      border: 3px solid black;
      background-color: white;
      cursor: pointer;
      padding: 10px;
    }

    .selected {
      border: 3px solid orange;
    }

    .progress-container {
      width: 100%;
      height: 20px;
      background-color: #ddd;
      margin-top: 15px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: green;
      text-align: center;
      color: white;
      font-size: 12px;
    }

    .buttons {
      margin-top: 30px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      cursor: pointer;
      color: white;
    }

    .red { background-color: red; }
    .blue { background-color: blue; }
    .green { background-color: green; }
    .reset { background-color: black; }
    .percent { background-color: purple; }
  </style>
</head>

<body>

<h2>UI with Progress Bar</h2>

<div class="container">
  <div class="box" onclick="selectBox(this)">
    Box 1
    <div class="progress-container">
      <div class="progress-bar">0%</div>
    </div>
  </div>

  <div class="box" onclick="selectBox(this)">
    Box 2
    <div class="progress-container">
      <div class="progress-bar">0%</div>
    </div>
  </div>
</div>

<div class="buttons">
  <!-- Color buttons -->
  <button class="red" onclick="changeColor('red')">Red</button>
  <button class="blue" onclick="changeColor('blue')">Blue</button>
  <button class="green" onclick="changeColor('green')">Green</button>

  <!-- Progress buttons -->
  <button class="percent" onclick="setProgress(10)">10%</button>
  <button class="percent" onclick="setProgress(50)">50%</button>
  <button class="percent" onclick="setProgress(100)">100%</button>

  <!-- Reset -->
  <button class="reset" onclick="resetAll()">Reset</button>
</div>

<script>
  let selectedBox = null;

  function selectBox(box) {
    document.querySelectorAll('.box').forEach(b => b.classList.remove('selected'));
    selectedBox = box;
    box.classList.add('selected');
  }

  function changeColor(color) {
    if (selectedBox) {
      selectedBox.style.backgroundColor = color;
    } else {
      alert("Select a box first");
    }
  }

  function setProgress(value) {
    if (selectedBox) {
      let bar = selectedBox.querySelector('.progress-bar');
      bar.style.width = value + "%";
      bar.innerText = value + "%";
    } else {
      alert("Select a box first");
    }
  }

  function resetAll() {
    document.querySelectorAll('.box').forEach(box => {
      box.style.backgroundColor = "white";
      box.classList.remove('selected');

      let bar = box.querySelector('.progress-bar');
      bar.style.width = "0%";
      bar.innerText = "0%";
    });

    selectedBox = null;
  }
</script>

</body>
</html>
