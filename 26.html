<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Calculator</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom right, #7fa9bb, #5f8fa6);
}

/* CARD */
.container {
  background: #d9d9d9;
  padding: 30px;
  width: 350px;
  border-radius: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* TITLE */
h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* LABEL */
label {
  display: block;
  margin-top: 15px;
  font-weight: bold;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 6px;
  border: 1px solid #aaa;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  background: #2f6f96;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #255c7d;
}

/* RESULT */
.result {
  text-align: center;
  margin-top: 20px;
  font-weight: bold;
  font-size: 18px;
}
</style>

</head>
<body>

<div class="container">
  <h2>Bank Loan EMI Calculator</h2>

  <label>Loan Amount (P):</label>
  <input type="number" id="amount" value="1000000">

  <label>Annual Interest Rate (%):</label>
  <input type="number" id="rate" value="9">

  <label>Tenure (months):</label>
  <input type="number" id="tenure" value="24">

  <button onclick="calculateEMI()">Calculate EMI</button>

  <div class="result" id="result">
    
  </div>
</div>

<script>
function calculateEMI() {
  let P = document.getElementById("amount").value;
  let annualRate = document.getElementById("rate").value;
  let N = document.getElementById("tenure").value;

  let R = (annualRate / 12) / 100;

  let EMI = (P * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1);

  document.getElementById("result").innerHTML =
    "Monthly EMI: " + EMI.toFixed(2);
}
</script>

</body>
</html>
